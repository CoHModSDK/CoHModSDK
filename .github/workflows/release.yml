name: Create Release

on:
  workflow_dispatch:
    inputs:
      build-ver:
        description: Build version
        required: true
        default: v0.0.0

jobs:
  build:
    uses: ./.github/workflows/build.yml

  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - build

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Download Build Artifacts
      uses: actions/download-artifact@v4
      with:
        name: CoHModSDK
        path: artifact

    - name: Create Release Zips
      run: |
        mkdir -p CoHModSDK
        printf '%s\n' \
          '# CoHModSDK Mod Loader Configuration' \
          '#' \
          '# List one mod DLL filename per line.' \
          '#' \
          '# Example:' \
          '#   MyMod.dll' \
          '#   AnotherMod.dll' \
          > CoHModSDK/CoHModSDKLoader.ini
        cp -a artifact/CoHModSDKLoader.dll CoHModSDK/
        cp -a artifact/CoHModSDKRuntime.dll CoHModSDK/
        cd CoHModSDK
        zip -r ../CoHModSDK-${{ github.event.inputs.build-ver }}.zip .
        cd ..

        mkdir -p CoHModSDK-Dev/include
        cp -a artifact/CoHModSDK.lib CoHModSDK-Dev/
        cp -a CoHModSDKRuntime/include/CoHModSDK.hpp CoHModSDK-Dev/include/
        cd CoHModSDK-Dev
        zip -r ../CoHModSDK-Dev-${{ github.event.inputs.build-ver }}.zip .
        cd ..

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.event.inputs.build-ver }}
        name: ${{ github.event.inputs.build-ver }}
        files: |
          CoHModSDK-${{ github.event.inputs.build-ver }}.zip
          CoHModSDK-Dev-${{ github.event.inputs.build-ver }}.zip
        draft: false
        prerelease: false
        make_latest: true
